services:
  mongodb:
    image: mongo:7
    container_name: sloppyquizz-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT_EXPOSED}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: sloppyquizz-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      API_PREFIX: ${API_PREFIX}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      UPLOAD_DIR: ${UPLOAD_DIR}
    ports:
      - "${BACKEND_PORT_EXPOSED}:8000"
    volumes:
      - backend_uploads:/app/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    container_name: sloppyquizz-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL}
      VITE_GIPHY_API_KEY: ${VITE_GIPHY_API_KEY}
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  mongodb_data:
  backend_uploads:
